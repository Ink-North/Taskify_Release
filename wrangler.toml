# wrangler.toml (wrangler v3.88.0^)
name = "taskify"
main = "worker/src/index.ts"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[build]
command = "bash -lc 'if [ -f ../scripts/install-worker-deps.mjs ]; then node ../scripts/install-worker-deps.mjs; else node ./scripts/install-worker-deps.mjs; fi'"

[assets]
directory = "taskify-pwa/dist"
binding = "ASSETS"

[triggers]
crons = ["*/1 * * * *"]

[observability.logs]
enabled = true

# Configure these in Cloudflare Worker variables/secrets (or `.dev.vars` for local dev):
# - VAPID_PUBLIC_KEY
# - VAPID_SUBJECT

[[kv_namespaces]]
binding = "TASKIFY_DEVICES"
id = "c22ac7468ada4612b14690ecfebef904"

[[kv_namespaces]]
binding = "TASKIFY_REMINDERS"
id = "03a8da2b890b4d33b7ddc9273ada7868"

[[kv_namespaces]]
binding = "TASKIFY_PENDING"
id = "448d7dc7170c4aff81c2a58c5e07e739"

[[kv_namespaces]]
binding = "VAPID_PRIVATE_KEY"
id = "45bbad6e354443ff9b101d61a27e5dd9"

[[r2_buckets]]
binding = "TASKIFY_BACKUPS"
bucket_name = "taskify-backups"
preview_bucket_name = "taskify-backups-preview"

# Google Calendar
# - GCAL_CLIENT_ID
# - GCAL_CLIENT_SECRET
# - GCAL_TOKEN_ENC_KEY
# - GCAL_TOKEN_ENC_KEY_PREV
# - GCAL_WEBHOOK_SECRET
# - GCAL_KEY_VERSION

[[d1_databases]]
binding = "TASKIFY_DB"
database_name = "taskify-notifications"
# TODO: replace with your D1 database ID after running `wrangler d1 create`
database_id = "1f1f5293-4694-4319-b56b-320faa325bf1"
migrations_dir = "worker/migrations"
